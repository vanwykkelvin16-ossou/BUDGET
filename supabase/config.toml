# Supabase local development config for PennyPlay.
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "pennyplay"

[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322
major_version = 15

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]

[auth.email]
enable_signup = true
enable_confirmations = false

# Google OAuth: fill in your credentials, then enable.
[auth.external.google]
enabled = false
client_id = ""
secret = ""

[functions.award-xp]
verify_jwt = true

# Builds the signed PayFast checkout for the signed-in user.
[functions.payfast-checkout]
verify_jwt = true

# PayFast posts payment notifications here — no user JWT on that request.
[functions.payfast-itn]
verify_jwt = false

# Cancels the signed-in user's monthly subscription at PayFast.
[functions.payfast-cancel]
verify_jwt = true
