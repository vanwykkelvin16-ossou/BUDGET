name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/pulse-budget-app-eelj24
  workflow_dispatch:

# Publishes to the gh-pages branch — GitHub serves it automatically, and no
# Pages-API permissions are needed (the API enablement path is blocked for
# the workflow token on this repo).
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (skip browser downloads)
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Run unit tests
        run: npm test

      - name: Build for Pages
        run: npm run build:pages

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-pages
